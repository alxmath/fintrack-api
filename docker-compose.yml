version: '3.9'

services:
  postgres:
    image: postgres:latest
    container_name: fintrack-postgres
    restart: always
    environment:
      POSTGRES_DB: fintrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - fintrack_pgdata:/var/lib/postgresql/data

volumes:
  fintrack_pgdata: